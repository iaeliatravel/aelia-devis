<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --text: #1a1a18;
    --text2: #6b6a64;
    --text3: #9b9a94;
    --border: #e2e1da;
    --accent: #1a1a18;
    --green: #0f6e56;
    --green-bg: #e1f5ee;
    --blue: #185fa5;
    --blue-bg: #e6f1fb;
    --amber: #ba7517;
    --amber-bg: #faeeda;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --purple: #534ab7;
    --purple-bg: #eeedfe;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }
  header {
    background: var(--text);
    color: #fff;
    padding: 52px 20px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-count {
    font-size: 12px;
    color: #888;
    margin-left: auto;
    font-family: 'DM Mono', monospace;
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.4;
    pointer-events: none;
  }
  input[type="search"] {
    width: 100%;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 10px 14px 10px 38px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }
  input[type="search"]::placeholder { color: rgba(255,255,255,0.35); }
  input[type="search"]:focus { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.15); }

  .list {
    padding: 12px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card {
    background: var(--surface);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .flag {
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
  }
  .card-info {
    flex: 1;
    min-width: 0;
  }
  .country-name {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.2px;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 5px;
    white-space: nowrap;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-blue { background: var(--blue-bg); color: var(--blue); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .badge-red { background: var(--red-bg); color: var(--red); }

  .price-tag {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--amber);
  }
  .chevron {
    flex-shrink: 0;
    color: var(--text3);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  }
  .card.open .chevron { transform: rotate(180deg); }

  .card-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .card.open .card-body { max-height: 9999px; }
  .card-body-inner {
    border-top: 1px solid var(--border);
    padding: 0;
  }

  .visa-option {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .visa-option:last-child { border-bottom: none; }

  .option-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .option-price {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    color: var(--amber);
    font-weight: 500;
    white-space: nowrap;
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13.5px;
  }
  .info-label {
    color: var(--text3);
    font-size: 12px;
    font-weight: 500;
    min-width: 58px;
    padding-top: 1px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .info-value {
    color: var(--text);
    line-height: 1.45;
  }

  .docs-list {
    list-style: none;
    margin-top: 4px;
  }
  .docs-list li {
    padding: 3px 0 3px 14px;
    position: relative;
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.45;
  }
  .docs-list li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: var(--text3);
    font-weight: 700;
  }

  .conditions-box {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 12.5px;
    color: var(--text2);
    line-height: 1.55;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text3);
    margin: 10px 0 5px;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 15px;
  }

  .delai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--surface2);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 12.5px;
    color: var(--text2);
    font-weight: 500;
  }

  .sub-section-note {
    background: var(--amber-bg);
    border-left: 3px solid var(--amber);
    border-radius: 0 6px 6px 0;
    padding: 8px 10px;
    font-size: 12.5px;
    color: var(--amber);
    margin-top: 8px;
    line-height: 1.5;
  }
</style>

function colorClass(c) {
  return 'badge-' + (c || 'green');
}

function renderDocs(label, list) {
  if (!list || !list.length) return '';
  return `
    <div class="section-label">${label}</div>
    <ul class="docs-list">${list.map(d => `<li>${d}</li>`).join('')}</ul>
  `;
}

function renderOption(opt) {
  const noteHtml = opt.note ? `<div class="sub-section-note">${opt.note}</div>` : '';
  const condHtml = opt.conditions ? `<div class="section-label">⚠️ Conditions</div><div class="conditions-box">${opt.conditions}</div>` : '';
  
  let extraDocs = '';
  if (opt.docs_mineur) extraDocs += renderDocs('Documents mineur', opt.docs_mineur);
  if (opt.docs_cas1) extraDocs += renderDocs('Cas 1 — Invité', opt.docs_cas1);
  if (opt.docs_cas2) extraDocs += renderDocs('Cas 2 — Autofinancé', opt.docs_cas2);
  if (opt.docs_cas3) extraDocs += renderDocs('Cas 3 — Garant au Japon', opt.docs_cas3);
  if (opt.docs_agence) extraDocs += renderDocs('Fourni par nous', opt.docs_agence);

  return `
    <div class="visa-option">
      <div class="option-title">
        <span>${opt.type}</span>
        <span class="option-price">${opt.price}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Délai</span>
        <span class="info-value">${opt.delai}</span>
      </div>
      ${opt.validite ? `<div class="info-row"><span class="info-label">Validité</span><span class="info-value">${opt.validite}</span></div>` : ''}
      ${renderDocs('Documents client', opt.docs_client)}
      ${extraDocs}
      ${noteHtml}
      ${condHtml}
    </div>
  `;
}

function getFirstPrice(item) {
  return item.options[0].price;
}

function getTypeBadges(item) {
  const seen = new Set();
  return item.options.map(o => {
    const key = o.typeColor;
    if (seen.has(key)) return '';
    seen.add(key);
    const labels = {green:'E-Visa',blue:'Sticker',amber:'Express',purple:'Renouvellement',red:'Annulation'};
    return `<span class="badge ${colorClass(o.typeColor)}">${labels[o.typeColor]||'Visa'}</span>`;
  }).join('');
}

function buildCard(item, idx) {
  const condGlobal = item.conditions ? `<div class="visa-option"><div class="section-label">⚠️ Conditions générales</div><div class="conditions-box">${item.conditions}</div></div>` : '';
  
  return `
    <div class="card" id="card-${idx}">
      <div class="card-header" onclick="toggleCard(${idx})">
        <span class="flag">${item.flag}</span>
        <div class="card-info">
          <div class="country-name">${item.country}</div>
          <div class="card-meta">
            ${getTypeBadges(item)}
            <span class="price-tag">${item.options.length > 1 ? 'dès ' : ''}${getFirstPrice(item)}</span>
          </div>
        </div>
        <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
      </div>
      <div class="card-body">
        <div class="card-body-inner">
          ${item.options.map(o => renderOption(o)).join('')}
          ${condGlobal}
        </div>
      </div>
    </div>
  `;
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  card.classList.toggle('open');
}

function render(items) {
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  if (!items.length) {
    list.innerHTML = '<div class="no-results">Aucun pays trouvé</div>';
    count.textContent = '0 pays';
    return;
  }
  list.innerHTML = items.map((item, i) => buildCard(item, item._idx)).join('');
  count.textContent = items.length + ' pays';
}

data.forEach((d, i) => d._idx = i);
render(data);

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (!q) { render(data); return; }
  const filtered = data.filter(d =>
    d.country.toLowerCase().includes(q) ||
    d.options.some(o => o.type.toLowerCase().includes(q))
  );
  render(filtered);
}
</script>
