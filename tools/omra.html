<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>عروض العمرة — Aelia Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1e8;
  --surface: #ffffff;
  --surface2: #f0ebe0;
  --surface3: #e8e0d0;
  --navy: #1a2d5a;
  --navy2: #243770;
  --navy-light: #e8ecf5;
  --gold: #c9a227;
  --gold2: #a8841a;
  --gold-bg: #fdf7e6;
  --gold-border: rgba(201,162,39,0.3);
  --text: #1a1a15;
  --text2: #4a4840;
  --text3: #9a9280;
  --border: #ddd6c4;
  --green: #1a6b3c;
  --green-bg: #e6f3ec;
  --red: #a32d2d;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Kufi Arabic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
  font-size: 15px;
}

/* ── HEADER ─── */
header {
  background: var(--navy);
  position: sticky;
  top: 0;
  z-index: 100;
  padding: 44px 16px 0;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 12px;
}
.logo-circle {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--gold) 0%, #e8c84a 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(201,162,39,0.4);
}
.logo-text { flex: 1; }
.logo-brand {
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.2px;
}
.logo-sub {
  font-size: 11px;
  color: var(--gold);
  font-weight: 500;
  margin-top: 1px;
}
.header-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  text-align: left;
}

.search-bar {
  padding: 0 0 12px;
  position: relative;
}
.search-bar input {
  width: 100%;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 9px 38px 9px 14px;
  color: #fff;
  font-family: 'Noto Kufi Arabic', sans-serif;
  font-size: 14px;
  outline: none;
  direction: rtl;
  -webkit-appearance: none;
}
.search-bar input::placeholder { color: rgba(255,255,255,0.28); }
.search-bar input:focus { border-color: var(--gold-border); background: rgba(255,255,255,0.13); }
.search-icon {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  opacity: 0.35;
  pointer-events: none;
}

/* ── HERO STRIP ─── */
.hero-strip {
  background: var(--navy);
  padding: 6px 16px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hero-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.hero-pill {
  background: rgba(201,162,39,0.15);
  border: 1px solid rgba(201,162,39,0.28);
  border-radius: 20px;
  padding: 3px 9px;
  font-size: 11.5px;
  color: var(--gold);
  font-weight: 500;
  white-space: nowrap;
}

/* ── TITLE BANNER ─── */
.title-banner {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 16px 16px 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.title-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(45deg, rgba(201,162,39,0.03) 0px, rgba(201,162,39,0.03) 1px, transparent 1px, transparent 20px);
  pointer-events: none;
}
.title-main {
  font-size: 30px;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  letter-spacing: 1px;
}
.title-sub {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  margin-top: 2px;
  opacity: 0.9;
}
.title-tagline {
  font-size: 12px;
  color: rgba(201,162,39,0.8);
  margin-top: 4px;
}
.ornament { color: var(--gold); font-size: 14px; letter-spacing: 4px; opacity: 0.6; margin: 2px 0; }

/* ── AIRLINE BAR ─── */
.airline-bar {
  background: var(--gold-bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.airline-logo {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--navy);
  display: flex;
  align-items: center;
  gap: 5px;
}
.airline-label {
  font-size: 12px;
  color: var(--text2);
  font-weight: 500;
}

/* ── LIST ─── */
.list {
  padding: 12px 14px 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* ── CARD ─── */
.card {
  background: var(--surface);
  border-radius: 16px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 13px 14px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}
.depart-num {
  width: 30px;
  height: 30px;
  background: var(--navy);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: var(--gold);
  flex-shrink: 0;
}
.dates-block { flex: 1; }
.dates-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--navy);
}
.dates-sep {
  color: var(--gold);
  font-size: 13px;
}
.dates-return {
  font-size: 12px;
  color: var(--text3);
  margin-top: 3px;
  font-weight: 400;
}
.nights-badge {
  background: var(--gold-bg);
  border: 1px solid var(--gold-border);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--gold2);
  white-space: nowrap;
}
.min-price {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--green);
  margin-top: 3px;
}
.chevron {
  color: var(--text3);
  flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}
.card.open .chevron { transform: rotate(180deg); }

.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1);
}
.card.open .card-body { max-height: 9999px; }
.card-body-inner { border-top: 1px solid var(--border); }

/* ── CITY HEADER ─── */
.city-header {
  background: var(--navy);
  padding: 9px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.city-header-text {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
}
.city-header-nights {
  font-size: 11px;
  color: var(--gold);
  font-weight: 500;
  margin-right: 4px;
}

/* ── HOTEL TABLE ─── */
.hotel-section { padding: 12px 14px; }

.hotel-row {
  margin-bottom: 10px;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.hotel-row:last-child { margin-bottom: 0; }
.hotel-name-row {
  background: var(--surface2);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
}
.hotel-name {
  font-size: 13.5px;
  font-weight: 600;
  color: var(--navy);
}
.hotel-stars {
  color: var(--gold);
  font-size: 12px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.price-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
}
.price-cell {
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  text-align: center;
  background: var(--surface);
}
.price-cell:nth-child(odd) { border-left: 1px solid var(--border); }
.price-cell-label {
  font-size: 11px;
  color: var(--text3);
  font-weight: 500;
  margin-bottom: 2px;
  direction: rtl;
}
.price-cell-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  color: var(--navy);
  direction: ltr;
}
.price-cell.best .price-cell-val { color: var(--green); }
.price-cell.best { background: var(--green-bg); }
.price-note {
  font-size: 11px;
  color: var(--text3);
  padding: 5px 12px;
  border-top: 1px solid var(--border);
  background: var(--surface2);
  text-align: center;
}

/* ── INCLUDES ─── */
.includes-section {
  background: var(--gold-bg);
  border-top: 1px solid var(--border);
  padding: 12px 14px;
}
.includes-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--gold2);
  text-align: center;
  margin-bottom: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.includes-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.include-item {
  background: var(--surface);
  border: 1px solid var(--gold-border);
  border-radius: 10px;
  padding: 8px 6px;
  text-align: center;
}
.include-icon { font-size: 20px; line-height: 1; margin-bottom: 4px; }
.include-label { font-size: 11.5px; color: var(--text2); font-weight: 500; }

/* ── FOOTER CARD ─── */
.contact-footer {
  margin: 0 14px;
  background: var(--navy);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.whatsapp-btn {
  background: #25d366;
  border-radius: 50%;
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.contact-info { flex: 1; }
.contact-phone {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  color: var(--gold);
  direction: ltr;
  text-align: right;
}
.contact-label {
  font-size: 11px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 2px;
}
.contact-addr {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-top: 3px;
}

.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
  font-size: 15px;
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-circle">✈️</div>
    <div class="logo-text">
      <div class="logo-brand">Aelia Travel</div>
      <div class="logo-sub">حي لاراديوز، الحراش — الجزائر</div>
    </div>
    <div class="header-count" id="count">— رحلة</div>
  </div>
  <div class="search-bar">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="searchInput" placeholder="ابحث عن تاريخ أو عرض…" oninput="filterCards()" autocomplete="off" spellcheck="false">
  </div>
</header>

<div class="title-banner">
  <div class="ornament">✦ ✦ ✦</div>
  <div class="title-main">عُمْرَة مُحَرَّم</div>
  <div class="title-sub">1447 هـ</div>
  <div class="title-tagline">رحلة روحانية... راحة وطمأنينة</div>
  <div class="ornament" style="margin-top:6px">✦ ✦ ✦</div>
</div>

<div class="airline-bar">
  <div class="airline-logo">🛫 الخطوط السعودية — Saudia</div>
  <div class="airline-label">رحلات ذهاباً وإياباً</div>
</div>

<div class="list" id="list"></div>

<div class="contact-footer">
  <div class="whatsapp-btn">📱</div>
  <div class="contact-info">
    <div class="contact-label">للحجز والاستفسار</div>
    <div class="contact-phone">0674 25 15 94</div>
    <div class="contact-addr">📍 حي لاراديوز، الحراش — الجزائر</div>
  </div>
</div>

<script>
const HOTELS_MECCA = [
  {
    name: "واحة الضيافة",
    stars: "★★★",
    prices: { "خماسية (5)": "199,000", "رباعية (4)": "209,000", "ثلاثية (3)": "239,000", "ثنائية (2)": "259,000" }
  },
  {
    name: "إشراق أجياد",
    stars: "★★★",
    prices: { "خماسية (5)": "229,000", "رباعية (4)": "239,000", "ثلاثية (3)": "259,000", "ثنائية (2)": "299,000" }
  },
  {
    name: "الميقات أجياد",
    stars: "★★★",
    prices: { "خماسية (5)": "249,000", "رباعية (4)": "259,000", "ثلاثية (3)": "279,000", "ثنائية (2)": "349,000" }
  }
];

const INCLUDES = [
  { icon: "📋", label: "التأشيرة" },
  { icon: "🎫", label: "التذكرة" },
  { icon: "🚌", label: "النقل" },
  { icon: "🏨", label: "الإسكان" },
  { icon: "🧭", label: "الإرشاد" },
  { icon: "🕌", label: "الزيارات" }
];

const departures = [
  {
    num: 1,
    depart: "15/06/2026",
    retour: "29/06/2026",
    nights: 14
  },
  {
    num: 2,
    depart: "21/06/2026",
    retour: "05/07/2026",
    nights: 14
  },
  {
    num: 3,
    depart: "30/06/2026",
    retour: "14/07/2026",
    nights: 14
  },
  {
    num: 4,
    depart: "06/07/2026",
    retour: "20/07/2026",
    nights: 14
  }
];

function renderHotel(h) {
  const entries = Object.entries(h.prices);
  const cells = entries.map(([ label, val ], i) => {
    const best = i === 0;
    return `<div class="price-cell${best ? ' best' : ''}">
      <div class="price-cell-label">${label}</div>
      <div class="price-cell-val">${val} دج</div>
    </div>`;
  }).join('');
  return `<div class="hotel-row">
    <div class="hotel-name-row">
      <span class="hotel-name">${h.name}</span>
      <span class="hotel-stars">${h.stars}</span>
    </div>
    <div class="price-grid">${cells}</div>
    <div class="price-note">السعر للشخص الواحد شاملاً جميع الخدمات</div>
  </div>`;
}

function renderCard(dep, idx) {
  const hotelsHtml = HOTELS_MECCA.map(renderHotel).join('');
  const includesHtml = INCLUDES.map(i => `
    <div class="include-item">
      <div class="include-icon">${i.icon}</div>
      <div class="include-label">${i.label}</div>
    </div>`).join('');

  return `<div class="card" id="card-${idx}">
    <div class="card-header" onclick="toggle(${idx})">
      <div class="depart-num">${dep.num}</div>
      <div class="dates-block">
        <div class="dates-row">
          <span>🛫 ${dep.depart}</span>
          <span class="dates-sep">→</span>
          <span>🛬 ${dep.retour}</span>
        </div>
        <div class="dates-return">
          <span class="nights-badge">🌙 ${dep.nights} ليلة</span>
          &nbsp;يبدأ من <span style="color:var(--green);font-weight:600;font-family:'DM Mono',monospace">199,000 دج</span>
        </div>
      </div>
      <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
    </div>
    <div class="card-body">
      <div class="card-body-inner">
        <div class="city-header">
          <span style="font-size:17px">🕋</span>
          <span class="city-header-text">فنادق مكة المكرمة والأسعار</span>
          <span class="city-header-nights">— للشخص الواحد</span>
        </div>
        <div class="hotel-section">${hotelsHtml}</div>
        <div class="includes-section">
          <div class="includes-title">✦ الخدمات المشمولة ✦</div>
          <div class="includes-grid">${includesHtml}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggle(idx) {
  document.getElementById('card-' + idx).classList.toggle('open');
}

function render(items) {
  const list = document.getElementById('list');
  const count = document.getElementById('count');
  if (!items.length) {
    list.innerHTML = '<div class="no-results">لا توجد نتائج</div>';
    count.textContent = '0';
    return;
  }
  list.innerHTML = items.map((d, i) => renderCard(d, i)).join('');
  count.textContent = items.length + ' رحلات';
}

render(departures);

function filterCards() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) { render(departures); return; }
  const filtered = departures.filter(d =>
    d.depart.includes(q) || d.retour.includes(q) || String(d.num).includes(q)
  );
  render(filtered);
}
</script>
</body>
</html>
